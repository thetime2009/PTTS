<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แผนที่ ปิ่นทองเทรดดิ้ง - Pinthong Trading Map</title>
<style>
    body {
        margin: 0;
        padding: 20px 0 50px 0;
        background: #f8f9fa; /* สีเทาอ่อนดูแพงขึ้น */
        text-align: center;
        font-family: 'Tahoma', sans-serif;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 25px; /* ระยะห่างระหว่างรูป */
    }

    img {
        width: 90%;
        max-width: 700px;
        height: auto; /* ป้องกันรูปเบี้ยว */
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        border-radius: 12px;
        border: 4px solid white; /* เพิ่มขอบขาวให้เหมือนกรอบรูป */
        transition: transform 0.3s ease;
    }

    img:hover {
        transform: scale(1.02); /* ขยายเล็กน้อยเวลาเอาเมาส์วาง */
    }

    h2 {
        color: #1a73e8;
        margin-bottom: 5px;
    }
</style>
</head>

<body>

    <h2>แผนที่และที่ตั้งโรงงาน</h2>
    <p>ปิ่นทองเทรดดิ้ง (Pinthong Trading)</p>
    <a href="https://maps.app.goo.gl/A65mhQwsxPFRkddbA" target="_blank" style="background:#4285f4; color:white; padding:15px; border-radius:50px; text-decoration:none; display:block; margin:20px auto; width:80%;">
   📍 นำทางไปโรงงาน (Google Maps)
    <div class="container">
        <!-- แผนที่กราฟิก -->
        <img src="MAP_PTTS.png" alt="แผนที่ ปิ่นทองเทรดดิ้ง">
        
        <!-- รูปถ่ายโรงงานจริง -->
        <img src="Factory.jpg" alt="โรงงานปิ่นทองเทรดดิ้ง">
    </div>

</body>
</html>
